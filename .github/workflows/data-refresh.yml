name: Refresh vulnerability data

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vulnerability-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Pull, validate, and publish aggregates
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Calculate the source-cache generation
        id: cache-key
        shell: bash
        run: echo "week=$(date -u +'%G-%V')" >> "$GITHUB_OUTPUT"

      - name: Restore official source archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .cache
          key: vulnsignal-source-feeds-${{ runner.os }}-${{ steps.cache-key.outputs.week }}-${{ github.run_id }}
          restore-keys: |
            vulnsignal-source-feeds-${{ runner.os }}-${{ steps.cache-key.outputs.week }}-
            vulnsignal-source-feeds-${{ runner.os }}-

      - name: Pull CVE, NVD, CISA KEV, EPSS, and LLM-disclosure data
        run: python3 scripts/sync_vulnerability_data.py

      - name: Validate the generated dataset
        run: python3 scripts/sync_vulnerability_data.py --check

      - name: Run ingestion unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py"

      - name: Install dashboard dependencies
        run: npm ci

      - name: Validate the dashboard contract and Pages export
        run: |
          npm run lint
          npm test
          npm run build:pages

      - name: Commit the refreshed aggregate
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json

          if git diff --cached --quiet; then
            echo "The generated dashboard dataset is already current."
            exit 0
          fi

          git commit -m "data: refresh vulnerability trends"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
